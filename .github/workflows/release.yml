name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Require successful Validate workflow on this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.repository.default_branch;
            const sha = context.sha;

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: "validate.yml",
              branch,
              event: "push",
              status: "completed",
              per_page: 100
            });

            const matchingRun = runs.find((run) => run.head_sha === sha && run.conclusion === "success");

            if (!matchingRun) {
              core.setFailed(
                `No successful Validate workflow run was found for commit ${sha} on branch ${branch}. Push this commit to ${branch}, wait for Validate to succeed, then create the release tag.`
              );
              return;
            }

            core.info(
              `Found successful Validate workflow run ${matchingRun.id} for commit ${sha} on branch ${branch}.`
            );

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify bundle syntax
        run: npm run check:syntax

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            /^## \[/ { if (capture) exit }
            capture { print }
          ' CHANGELOG.md > release_section.md

          if ! grep -q '[^[:space:]]' release_section.md; then
            echo "No release notes found for version [$VERSION] in CHANGELOG.md" >&2
            exit 1
          fi

          awk '
            /^### Release Summary$/ { capture=1; next }
            /^### / { if (capture) exit }
            capture { print }
          ' release_section.md > release_notes.md

          if ! grep -q '[^[:space:]]' release_notes.md; then
            cp release_section.md release_notes.md
          fi

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/house_energy_bar.js
          body_path: release_notes.md
          generate_release_notes: false
